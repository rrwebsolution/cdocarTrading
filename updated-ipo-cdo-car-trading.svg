<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="2820" viewBox="0 0 2400 2820">
  <rect width="2400" height="2820" fill="#ffffff"/>
  <style>
    .title { font: 700 34px Arial, Helvetica, sans-serif; fill: #111111; }
    .head { font: 700 32px Arial, Helvetica, sans-serif; fill: #111111; }
    .input { font: 24px Arial, Helvetica, sans-serif; fill: #111111; }
    .cell { font: 23px Arial, Helvetica, sans-serif; fill: #111111; }
    .note { font: 22px Arial, Helvetica, sans-serif; fill: #111111; }
    .box { fill: #ffffff; stroke: #111111; stroke-width: 4; }
    .header-box { fill: #f3f4f6; stroke: #111111; stroke-width: 4; }
  </style>
  <text x="1200" y="52" text-anchor="middle" class="title">CDO Car Trading Management System - Updated IPO</text>
  <rect x="34" y="82" width="520" height="70" class="header-box"/>
  <text x="294" y="125" text-anchor="middle" class="head">
    <tspan x="294" dy="0">I</tspan>
  </text>
  <rect x="566" y="82" width="930" height="70" class="header-box"/>
  <text x="1031" y="125" text-anchor="middle" class="head">
    <tspan x="1031" dy="0">P</tspan>
  </text>
  <rect x="1508" y="82" width="840" height="70" class="header-box"/>
  <text x="1928" y="125" text-anchor="middle" class="head">
    <tspan x="1928" dy="0">O</tspan>
  </text>
  <rect x="34" y="164" width="520" height="138" class="box"/>
  <rect x="566" y="164" width="930" height="138" class="box"/>
  <rect x="1508" y="164" width="840" height="138" class="box"/>
  <text x="294" y="241" text-anchor="middle" class="input">
    <tspan x="294" dy="0">U</tspan>
  </text>
  <text x="1031" y="227.5" text-anchor="middle" class="cell">
    <tspan x="1031" dy="0">Register/login users, manage user accounts, update status,</tspan>
    <tspan x="1031" dy="27">and assign role access</tspan>
  </text>
  <text x="1928" y="227.5" text-anchor="middle" class="cell">
    <tspan x="1928" dy="0">User account records, login access, active/inactive</tspan>
    <tspan x="1928" dy="27">user list</tspan>
  </text>
  <rect x="34" y="314" width="520" height="138" class="box"/>
  <rect x="566" y="314" width="930" height="138" class="box"/>
  <rect x="1508" y="314" width="840" height="138" class="box"/>
  <text x="294" y="377" text-anchor="middle" class="input">
    <tspan x="294" dy="0">Role and Permission</tspan>
    <tspan x="294" dy="28">Details</tspan>
  </text>
  <text x="1031" y="377.5" text-anchor="middle" class="cell">
    <tspan x="1031" dy="0">Create roles, update permissions, and assign module access</tspan>
    <tspan x="1031" dy="27">per user type</tspan>
  </text>
  <text x="1928" y="391" text-anchor="middle" class="cell">
    <tspan x="1928" dy="0">R</tspan>
  </text>
  <rect x="34" y="464" width="520" height="138" class="box"/>
  <rect x="566" y="464" width="930" height="138" class="box"/>
  <rect x="1508" y="464" width="840" height="138" class="box"/>
  <text x="294" y="541" text-anchor="middle" class="input">
    <tspan x="294" dy="0">S</tspan>
  </text>
  <text x="1031" y="500.5" text-anchor="middle" class="cell">
    <tspan x="1031" dy="0">Register customers, update vehicles, process reservations,</tspan>
    <tspan x="1031" dy="27">encode sales/payments, record</tspan>
    <tspan x="1031" dy="27">financing/documents/releases, and create or assign job</tspan>
    <tspan x="1031" dy="27">orders</tspan>
  </text>
  <text x="1928" y="514" text-anchor="middle" class="cell">
    <tspan x="1928" dy="0">Secretary records, updated customer/vehicle records,</tspan>
    <tspan x="1928" dy="27">reservations, payments, financing, documents, and</tspan>
    <tspan x="1928" dy="27">releases</tspan>
  </text>
  <rect x="34" y="614" width="520" height="138" class="box"/>
  <rect x="566" y="614" width="930" height="138" class="box"/>
  <rect x="1508" y="614" width="840" height="138" class="box"/>
  <text x="294" y="691" text-anchor="middle" class="input">
    <tspan x="294" dy="0">M</tspan>
  </text>
  <text x="1031" y="664" text-anchor="middle" class="cell">
    <tspan x="1031" dy="0">View assigned job orders, update repair progress, record</tspan>
    <tspan x="1031" dy="27">inspection findings, update vehicle condition, and</tspan>
    <tspan x="1031" dy="27">document pre-sale repair actions</tspan>
  </text>
  <text x="1928" y="664" text-anchor="middle" class="cell">
    <tspan x="1928" dy="0">Mechanic job order updates, repair records,</tspan>
    <tspan x="1928" dy="27">inspection findings, vehicle condition/status</tspan>
    <tspan x="1928" dy="27">updates</tspan>
  </text>
  <rect x="34" y="764" width="520" height="138" class="box"/>
  <rect x="566" y="764" width="930" height="138" class="box"/>
  <rect x="1508" y="764" width="840" height="138" class="box"/>
  <text x="294" y="841" text-anchor="middle" class="input">
    <tspan x="294" dy="0">C</tspan>
  </text>
  <text x="1031" y="827.5" text-anchor="middle" class="cell">
    <tspan x="1031" dy="0">View assigned carwash job orders, update washing/detailing</tspan>
    <tspan x="1031" dy="27">status, and mark cleaning services as completed</tspan>
  </text>
  <text x="1928" y="827.5" text-anchor="middle" class="cell">
    <tspan x="1928" dy="0">Carwash job order updates, washing/detailing status</tspan>
    <tspan x="1928" dy="27">records, completed cleaning records</tspan>
  </text>
  <rect x="34" y="914" width="520" height="138" class="box"/>
  <rect x="566" y="914" width="930" height="138" class="box"/>
  <rect x="1508" y="914" width="840" height="138" class="box"/>
  <text x="294" y="991" text-anchor="middle" class="input">
    <tspan x="294" dy="0">C</tspan>
  </text>
  <text x="1031" y="977.5" text-anchor="middle" class="cell">
    <tspan x="1031" dy="0">Register customers, update customer profile, maintain</tspan>
    <tspan x="1031" dy="27">contact/address/status</tspan>
  </text>
  <text x="1928" y="977.5" text-anchor="middle" class="cell">
    <tspan x="1928" dy="0">Customer records, customer profile, active customer</tspan>
    <tspan x="1928" dy="27">list</tspan>
  </text>
  <rect x="34" y="1064" width="520" height="138" class="box"/>
  <rect x="566" y="1064" width="930" height="138" class="box"/>
  <rect x="1508" y="1064" width="840" height="138" class="box"/>
  <text x="294" y="1141" text-anchor="middle" class="input">
    <tspan x="294" dy="0">V</tspan>
  </text>
  <text x="1031" y="1114" text-anchor="middle" class="cell">
    <tspan x="1031" dy="0">Add/update vehicle inventory including brand, model, year,</tspan>
    <tspan x="1031" dy="27">color, engine/chassis/plate number, mileage, pricing,</tspan>
    <tspan x="1031" dy="27">photos, location, and status</tspan>
  </text>
  <text x="1928" y="1127.5" text-anchor="middle" class="cell">
    <tspan x="1928" dy="0">Vehicle inventory records, vehicle list,</tspan>
    <tspan x="1928" dy="27">available/reserved/sold/for repair status</tspan>
  </text>
  <rect x="34" y="1214" width="520" height="138" class="box"/>
  <rect x="566" y="1214" width="930" height="138" class="box"/>
  <rect x="1508" y="1214" width="840" height="138" class="box"/>
  <text x="294" y="1291" text-anchor="middle" class="input">
    <tspan x="294" dy="0">R</tspan>
  </text>
  <text x="1031" y="1277.5" text-anchor="middle" class="cell">
    <tspan x="1031" dy="0">Create, review, approve, update, monitor, or cancel</tspan>
    <tspan x="1031" dy="27">vehicle reservations</tspan>
  </text>
  <text x="1928" y="1277.5" text-anchor="middle" class="cell">
    <tspan x="1928" dy="0">Reservation history, approval status, expiring</tspan>
    <tspan x="1928" dy="27">reservation records</tspan>
  </text>
  <rect x="34" y="1364" width="520" height="138" class="box"/>
  <rect x="566" y="1364" width="930" height="138" class="box"/>
  <rect x="1508" y="1364" width="840" height="138" class="box"/>
  <text x="294" y="1441" text-anchor="middle" class="input">
    <tspan x="294" dy="0">S</tspan>
  </text>
  <text x="1031" y="1414" text-anchor="middle" class="cell">
    <tspan x="1031" dy="0">Record vehicle sale, link customer/vehicle/reservation,</tspan>
    <tspan x="1031" dy="27">compute total amount, paid amount, balance, payment</tspan>
    <tspan x="1031" dy="27">method, and sale status</tspan>
  </text>
  <text x="1928" y="1427.5" text-anchor="middle" class="cell">
    <tspan x="1928" dy="0">Sales transaction records, purchase history,</tspan>
    <tspan x="1928" dy="27">outstanding balance report</tspan>
  </text>
  <rect x="34" y="1514" width="520" height="138" class="box"/>
  <rect x="566" y="1514" width="930" height="138" class="box"/>
  <rect x="1508" y="1514" width="840" height="138" class="box"/>
  <text x="294" y="1591" text-anchor="middle" class="input">
    <tspan x="294" dy="0">P</tspan>
  </text>
  <text x="1031" y="1564" text-anchor="middle" class="cell">
    <tspan x="1031" dy="0">Record customer payments, receipt number, amount, method,</tspan>
    <tspan x="1031" dy="27">proof of payment, paid date, status, and update sale</tspan>
    <tspan x="1031" dy="27">totals</tspan>
  </text>
  <text x="1928" y="1577.5" text-anchor="middle" class="cell">
    <tspan x="1928" dy="0">Payment records, receipts, proof review status,</tspan>
    <tspan x="1928" dy="27">updated customer balance</tspan>
  </text>
  <rect x="34" y="1664" width="520" height="138" class="box"/>
  <rect x="566" y="1664" width="930" height="138" class="box"/>
  <rect x="1508" y="1664" width="840" height="138" class="box"/>
  <text x="294" y="1741" text-anchor="middle" class="input">
    <tspan x="294" dy="0">F</tspan>
  </text>
  <text x="1031" y="1714" text-anchor="middle" class="cell">
    <tspan x="1031" dy="0">Record financing company, application number, approved</tspan>
    <tspan x="1031" dy="27">amount, down payment, approval date, documents, remarks,</tspan>
    <tspan x="1031" dy="27">and status</tspan>
  </text>
  <text x="1928" y="1727.5" text-anchor="middle" class="cell">
    <tspan x="1928" dy="0">Financing records, financial basis tracking,</tspan>
    <tspan x="1928" dy="27">financing approval/status report</tspan>
  </text>
  <rect x="34" y="1814" width="520" height="138" class="box"/>
  <rect x="566" y="1814" width="930" height="138" class="box"/>
  <rect x="1508" y="1814" width="840" height="138" class="box"/>
  <text x="294" y="1891" text-anchor="middle" class="input">
    <tspan x="294" dy="0">S</tspan>
  </text>
  <text x="1031" y="1877.5" text-anchor="middle" class="cell">
    <tspan x="1031" dy="0">Customer submits repair or maintenance request with</tspan>
    <tspan x="1031" dy="27">vehicle, service type, issue, photo, progress, and status</tspan>
  </text>
  <text x="1928" y="1877.5" text-anchor="middle" class="cell">
    <tspan x="1928" dy="0">Service request history, repair progress status,</tspan>
    <tspan x="1928" dy="27">customer service record</tspan>
  </text>
  <rect x="34" y="1964" width="520" height="138" class="box"/>
  <rect x="566" y="1964" width="930" height="138" class="box"/>
  <rect x="1508" y="1964" width="840" height="138" class="box"/>
  <text x="294" y="2041" text-anchor="middle" class="input">
    <tspan x="294" dy="0">J</tspan>
  </text>
  <text x="1031" y="2000.5" text-anchor="middle" class="cell">
    <tspan x="1031" dy="0">Secretary creates job order from a service request or</tspan>
    <tspan x="1031" dy="27">vehicle maintenance need, assigns mechanic/carwasher,</tspan>
    <tspan x="1031" dy="27">schedules work, then assigned staff update repair or</tspan>
    <tspan x="1031" dy="27">washing progress</tspan>
  </text>
  <text x="1928" y="2027.5" text-anchor="middle" class="cell">
    <tspan x="1928" dy="0">Job order records, assigned work list,</tspan>
    <tspan x="1928" dy="27">repair/washing progress, service completion records</tspan>
  </text>
  <rect x="34" y="2114" width="520" height="138" class="box"/>
  <rect x="566" y="2114" width="930" height="138" class="box"/>
  <rect x="1508" y="2114" width="840" height="138" class="box"/>
  <text x="294" y="2177" text-anchor="middle" class="input">
    <tspan x="294" dy="0">Vehicle Parts / Pre-Sale</tspan>
    <tspan x="294" dy="28">Repair Details</tspan>
  </text>
  <text x="1031" y="2164" text-anchor="middle" class="cell">
    <tspan x="1031" dy="0">Record affected parts only during inspection or repair,</tspan>
    <tspan x="1031" dy="27">including issue, action taken, repair cost, before/after</tspan>
    <tspan x="1031" dy="27">photos, assigned staff, and readiness status</tspan>
  </text>
  <text x="1928" y="2177.5" text-anchor="middle" class="cell">
    <tspan x="1928" dy="0">Affected-parts record, pre-sale inspection record,</tspan>
    <tspan x="1928" dy="27">repair record, ready-for-sale status</tspan>
  </text>
  <rect x="34" y="2264" width="520" height="138" class="box"/>
  <rect x="566" y="2264" width="930" height="138" class="box"/>
  <rect x="1508" y="2264" width="840" height="138" class="box"/>
  <text x="294" y="2341" text-anchor="middle" class="input">
    <tspan x="294" dy="0">V</tspan>
  </text>
  <text x="1031" y="2327.5" text-anchor="middle" class="cell">
    <tspan x="1031" dy="0">Verify release checklist, document status, released date,</tspan>
    <tspan x="1031" dy="27">released by, remarks, and final status</tspan>
  </text>
  <text x="1928" y="2327.5" text-anchor="middle" class="cell">
    <tspan x="1928" dy="0">Vehicle release records, turnover checklist,</tspan>
    <tspan x="1928" dy="27">released vehicle report</tspan>
  </text>
  <rect x="34" y="2414" width="520" height="138" class="box"/>
  <rect x="566" y="2414" width="930" height="138" class="box"/>
  <rect x="1508" y="2414" width="840" height="138" class="box"/>
  <text x="294" y="2491" text-anchor="middle" class="input">
    <tspan x="294" dy="0">D</tspan>
  </text>
  <text x="1031" y="2477.5" text-anchor="middle" class="cell">
    <tspan x="1031" dy="0">Upload/verify documents, generate reports, and record</tspan>
    <tspan x="1031" dy="27">important system actions</tspan>
  </text>
  <text x="1928" y="2477.5" text-anchor="middle" class="cell">
    <tspan x="1928" dy="0">Document records, summary reports, system audit</tspan>
    <tspan x="1928" dy="27">trail/activity logs</tspan>
  </text>
  <text x="1200" y="2768" text-anchor="middle" class="note">
    <tspan x="1200" dy="0">Note: Vehicle Parts is not a separate inventory module in the current code; parts are recorded only as affected parts during pre-sale repair</tspan>
    <tspan x="1200" dy="24">or job-order work.</tspan>
  </text>
</svg>
